<!DOCTYPE html>
<html lang="en">
<head>

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    font-family: "Plus Jakarta Sans", system-ui, sans-serif;
    background:
      radial-gradient(1200px 600px at 50% -10%, #16261d 0%, transparent 60%),
      #0a100d;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    overflow: hidden;
  }

  /* Default theme: brand green + light neutrals (prototype TWEAK_DEFAULTS) */
  .hp-phone {
    --app-bg: #F1F5F2; --card: #FFFFFF; --ink: #0E1512; --muted: #5E6E66;
    --line: #E8EDEA; --line-strong: #CCD6D1; --track: #F2F5F3;
    --shadow: 0 1px 2px rgba(13,30,22,.05), 0 1px 1px rgba(13,30,22,.04);
    --brand: #16A35A; --brand-deep: #0B6E45; --brand-tint: rgba(22,163,90,.12); --brand-glow: rgba(22,163,90,.32);
  }

  .hp-stage {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }

  .hp-phone {
    width: 390px; height: 844px; flex-shrink: 0;
    background: var(--app-bg);
    border-radius: 46px;
    box-shadow: 0 0 0 11px #0c0c0e, 0 0 0 13px #25282b, 0 40px 80px -20px rgba(0,0,0,.7);
    display: flex; flex-direction: column;
    overflow: hidden; position: relative;
    transform-origin: center center;
    color: var(--ink);
  }

  .hp-status {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 26px 6px; font-size: 13px; color: var(--ink); flex-shrink: 0;
  }

  .hp-header {
    display: flex; align-items: center; gap: 11px;
    padding: 6px 16px 12px; flex-shrink: 0;
    border-bottom: 1px solid var(--line);
    background: var(--app-bg);
  }
  .hp-iconbtn {
    width: 36px; height: 36px; border-radius: 11px; border: none; background: transparent;
    display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--ink);
    flex-shrink: 0; padding: 0;
  }
  .hp-iconbtn:hover { background: var(--track); }

  .hp-content {
    flex: 1; overflow-y: auto; overflow-x: hidden;
    padding-top: 14px; padding-bottom: 18px;
    background: var(--app-bg);
    scrollbar-width: none;
    -webkit-overflow-scrolling: touch;
  }
  .hp-content::-webkit-scrollbar { display: none; }

  @keyframes hp-pop { 0% { transform: scale(.3); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

  .hp-nav {
    display: flex; align-items: stretch; flex-shrink: 0;
    padding: 8px 6px 22px;
    background: var(--card);
    border-top: 1px solid var(--line);
    position: relative;
  }
  .hp-nav::after {
    content: ""; position: absolute; bottom: 9px; left: 50%; transform: translateX(-50%);
    width: 128px; height: 5px; border-radius: 3px; background: var(--ink); opacity: .18;
  }
  .hp-tab {
    flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px;
    background: none; border: none; cursor: pointer; padding: 7px 0 6px;
    font-family: inherit; font-size: 10.5px; font-weight: 700; position: relative;
    transition: transform .12s;
  }
  .hp-tab:active { transform: scale(.92); }
  .hp-tab-dot {
    position: absolute; top: -1px; left: 50%; transform: translateX(-50%);
    width: 18px; height: 3px; border-radius: 3px; background: var(--brand);
  }

  /* Range slider (evaluation sliders) */
  .hp-range {
    -webkit-appearance: none; appearance: none; height: 10px; border-radius: 6px; outline: none;
    background: linear-gradient(to right, var(--brand) var(--pct), var(--track) var(--pct));
  }
  .hp-range::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none; width: 26px; height: 26px; border-radius: 50%;
    background: #fff; border: 4px solid var(--brand); cursor: grab; box-shadow: 0 2px 6px rgba(0,0,0,.2);
  }
  .hp-range::-moz-range-thumb {
    width: 26px; height: 26px; border-radius: 50%; background: #fff; border: 4px solid var(--brand); cursor: grab;
  }

  h1, h2, h3, p { text-wrap: pretty; }
  button { -webkit-tap-highlight-color: transparent; }
</style>
</head>

  };
  function Icon({ name, size = 22, stroke = 2, fill = "none", color = "currentColor", style }) {
    return (
      <svg width={size} height={size} viewBox="0 0 24 24" fill={fill === "current" ? color : "none"}
        stroke={color} strokeWidth={stroke} strokeLinecap="round" strokeLinejoin="round"
        style={{ flexShrink: 0, ...style }}>
        <path d={ICON[name] || ""} />
      </svg>
    );
  }

  const AV_COLORS = [
    ["#16A35A", "#0B6E45"], ["#FF6B2C", "#C2410C"], ["#2563EB", "#1E40AF"],
    ["#7C3AED", "#5B21B6"], ["#0891B2", "#155E75"], ["#DB2777", "#9D174D"],
    ["#CA8A04", "#854D0E"], ["#DC2626", "#991B1B"],
  ];
  function initials(name) {
    return name.split(" ").map(w => w[0]).slice(0, 2).join("").toUpperCase();
  }
  function Avatar({ name, size = 44, num, ring }) {
    const idx = name.split("").reduce((a, c) => a + c.charCodeAt(0), 0) % AV_COLORS.length;
    const [c1, c2] = AV_COLORS[idx];
    return (
      <div style={{
        width: size, height: size, borderRadius: size * 0.32, flexShrink: 0,
        background: `linear-gradient(145deg, ${c1}, ${c2})`, color: "#fff",
        display: "flex", alignItems: "center", justifyContent: "center",
        fontFamily: "Sora, sans-serif", fontWeight: 700, fontSize: size * 0.38,
        position: "relative", boxShadow: ring ? `0 0 0 3px ${ring}` : "none",
        letterSpacing: "-0.02em",

        {initials(name)}
        {num != null && (
          <span style={{
            position: "absolute", bottom: -4, insetInlineEnd: -4, minWidth: 18, height: 18, padding: "0 4px",

  function ratingColor(v) {
    if (v >= 85) return "var(--brand)";
    if (v >= 70) return "#16A35A";
    if (v >= 55) return "#CA8A04";

  }
  function SkillBar({ label, value }) {
    return (

        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline" }}>

    const c = ratingColor(value);
    return (
      <div style={{
        display: "flex", flexDirection: "column", gap: 2, padding: "10px 12px", borderRadius: 14,

  function Pill({ children, color = "muted", solid }) {
    const map = {
      brand: ["var(--brand)", "var(--brand-tint)"],
      accent: ["#FF6B2C", "rgba(255,107,44,.13)"],
      blue: ["#2563EB", "rgba(37,99,235,.12)"],
      green: ["#16A35A", "rgba(22,163,90,.12)"],
      muted: ["var(--muted)", "var(--track)"],

        display: "inline-flex", alignItems: "center", gap: 5, padding: "4px 10px", borderRadius: 999,

    return (
      <div {...rest} style={{

    return (

  /* Star rating (interactive) */
  function StarRating({ value, onChange, max = 5, size = 34 }) {
    return (
      <div style={{ display: "flex", gap: 6 }}>
        {Array.from({ length: max }).map((_, i) => {
          const active = i < value;
          return (
            <button key={i} onClick={() => onChange(i + 1 === value ? 0 : i + 1)}
              aria-label={`${i + 1} stars`}
              style={{ border: "none", background: "none", padding: 2, cursor: "pointer", lineHeight: 0 }}>
              <Icon name="star" size={size} stroke={1.6}
                fill={active ? "current" : "none"}
                color={active ? "var(--brand)" : "var(--line-strong)"} />
            </button>
          );
        })}
      </div>
    );
  }

  /* Slider (interactive, 0-100) */
  function RangeRow({ value, onChange, min = 0, max = 100 }) {
    const pct = ((value - min) / (max - min)) * 100;
    return (
      <div style={{ display: "flex", alignItems: "center", gap: 14 }}>
        <input type="range" min={min} max={max} value={value}
          onChange={e => onChange(+e.target.value)}
          className="hp-range"
          style={{ flex: 1, "--pct": pct + "%" }} />
        <span style={{ fontFamily: "Sora", fontWeight: 800, fontSize: 18, color: "var(--brand)", minWidth: 34, textAlign: "end" }}>{value}</span>
      </div>
    );
  }

  /* Segmented control */
  function Segmented({ options, value, onChange, size = "md" }) {
    return (
      <div style={{
        display: "inline-flex", background: "var(--track)", borderRadius: 12, padding: 3, gap: 2,
        border: "1px solid var(--line)",

        {options.map(o => {
          const active = o.value === value;
          return (
            <button key={o.value} onClick={() => onChange(o.value)}
              style={{

  /* ============================================================
     SCREEN 3 — Match Lineup Builder (drag & drop)
     ============================================================ */
  function autoFill(formation, players) {
    const slots = FORMATIONS[formation];
    const used = new Set();
    const assign = {};
    slots.forEach((s, i) => {
      // prefer same line + available, then any available
      const pick = players.find(p => !used.has(p.id) && p.line === s.line && p.avail !== "out")
        || players.find(p => !used.has(p.id) && p.line === s.line)
        || players.find(p => !used.has(p.id) && p.avail !== "out");
      if (pick) { assign[i] = pick.id; used.add(pick.id); }
    });
    return assign;
  }

  const tokenName = {
    fontSize: 10.5, fontWeight: 700, color: "#fff", background: "rgba(0,0,0,.35)", padding: "1px 7px",

  function LineupScreen({ t, tweaks }) {
    const players = PLAYERS;
    const byId = id => players.find(p => p.id === id);
    const [formation, setFormation] = useState("4-3-3");
    const [assign, setAssign] = useState(() => autoFill("4-3-3", players));
    const [drag, setDrag] = useState(null); // {pid, x, y, from}
    const [saved, setSaved] = useState(false);
    const pitchRef = useRef(null);
    const dragRef = useRef(null);
    dragRef.current = drag;

    const slots = FORMATIONS[formation];
    const assignedIds = new Set(Object.values(assign));
    const roster = players.filter(p => !assignedIds.has(p.id));
    const onCount = Object.values(assign).filter(id => byId(id)?.avail === "in").length;

    const changeFormation = (f) => { setFormation(f); setAssign(autoFill(f, players)); };

    const startDrag = (e, pid, from) => {
      e.preventDefault();
      const pt = e.touches ? e.touches[0] : e;
      setDrag({ pid, x: pt.clientX, y: pt.clientY, from });
    };

    useEffect(() => {
      if (!drag) return;
      const move = (e) => {
        const pt = e.touches ? e.touches[0] : e;
        setDrag(d => d ? { ...d, x: pt.clientX, y: pt.clientY } : d);
      };
      const up = (e) => {
        const d = dragRef.current;
        if (!d) return;
        const pt = e.changedTouches ? e.changedTouches[0] : e;
        const rect = pitchRef.current.getBoundingClientRect();
        const inside = pt.clientX >= rect.left && pt.clientX <= rect.right && pt.clientY >= rect.top && pt.clientY <= rect.bottom;
        if (inside) {
          // nearest slot
          let best = -1, bestDist = Infinity;
          slots.forEach((s, i) => {
            const sx = rect.left + s.x / 100 * rect.width;
            const sy = rect.top + s.y / 100 * rect.height;
            const dist = Math.hypot(sx - pt.clientX, sy - pt.clientY);
            if (dist < bestDist) { bestDist = dist; best = i; }
          });
          setAssign(a => {
            const na = { ...a };
            // remove dragged from its old slot
            if (d.from != null) delete na[d.from];
            else Object.keys(na).forEach(k => { if (na[k] === d.pid) delete na[k]; });
            // swap if target occupied
            const occupant = na[best];
            if (occupant && d.from != null) na[d.from] = occupant;
            na[best] = d.pid;
            return na;
          });
        } else if (d.from != null) {
          // dropped outside -> remove from pitch
          setAssign(a => { const na = { ...a }; delete na[d.from]; return na; });
        }
        setDrag(null);
      };
      window.addEventListener("pointermove", move);
      window.addEventListener("pointerup", up);
      return () => { window.removeEventListener("pointermove", move); window.removeEventListener("pointerup", up); };
    }, [drag ? true : false, formation]);

    return (
      <div style={{ padding: "0 16px 12px", userSelect: "none", touchAction: "none" }}>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 12 }}>
          <Segmented size="sm" value={formation}
            options={Object.keys(FORMATIONS).map(f => ({ value: f, label: f }))}
            onChange={changeFormation} />
          <span style={{ display: "inline-flex", alignItems: "center", gap: 6, fontSize: 12.5, fontWeight: 700, color: "var(--muted)" }}>
            <span style={{ width: 9, height: 9, borderRadius: "50%", background: "#16A35A" }} />{onCount} {t.avail_in.toLowerCase()}
          </span>
        </div>

        {/* Pitch */}
        <div ref={pitchRef} style={{
          position: "relative", width: "100%", aspectRatio: "3/4", borderRadius: 20, overflow: "hidden",
          background: "linear-gradient(160deg, #1d9c5e, #14823f)",
          boxShadow: "var(--shadow)", marginBottom: 14,
        }}>
          <PitchMarkings />
          {slots.map((s, i) => {
            const pid = assign[i];
            const p = pid ? byId(pid) : null;
            const isDragging = drag && drag.from === i;
            return (
              <div key={i} style={{
                position: "absolute", left: s.x + "%", top: s.y + "%", transform: "translate(-50%,-50%)",
                display: "flex", flexDirection: "column", alignItems: "center", gap: 3, opacity: isDragging ? .3 : 1,
              }}>
                {p ? (
                  <div onPointerDown={(e) => startDrag(e, pid, i)} style={{ cursor: "grab", display: "flex", flexDirection: "column", alignItems: "center", gap: 3 }}>
                    <Token player={p} />
                    <span style={tokenName}>{p.name.split(" ")[0]}</span>
                  </div>
                ) : (
                  <div style={{
                    width: 44, height: 44, borderRadius: 14, border: "2px dashed rgba(255,255,255,.6)",
                    display: "flex", alignItems: "center", justifyContent: "center", color: "rgba(255,255,255,.85)",
                    fontSize: 10.5, fontWeight: 700, background: "rgba(255,255,255,.08)",
                  }}>{s.slot}</div>
                )}
              </div>
            );
          })}
        </div>

        {/* Roster */}
        <SectionLabel action={<span style={{ fontSize: 12, color: "var(--muted)", fontWeight: 600 }}>{t.drag_hint}</span>}>{t.roster} · {roster.length}</SectionLabel>
        <div style={{ display: "flex", gap: 10, overflowX: "auto", paddingBottom: 6, margin: "0 -16px", padding: "2px 16px 6px" }}>
          {roster.length === 0 && <span style={{ fontSize: 13, color: "var(--muted)", padding: "8px 0" }}>All players on the pitch.</span>}
          {roster.map(p => (
            <div key={p.id} onPointerDown={(e) => startDrag(e, p.id, null)}
              style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 5, cursor: "grab", flexShrink: 0, width: 60 }}>
              <div style={{ position: "relative" }}>
                <Avatar name={p.name} size={48} />
                <span style={{ position: "absolute", bottom: -3, insetInlineEnd: -3, width: 14, height: 14, borderRadius: "50%", background: AVAIL[p.avail].color, border: "2.5px solid var(--card)" }} />
              </div>
              <span style={{ fontSize: 11, fontWeight: 600, color: "var(--ink)", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis", maxWidth: 60, textAlign: "center" }}>{p.name.split(" ")[0]}</span>
              <Pill color="brand">{p.pos}</Pill>
            </div>
          ))}
        </div>

        <button onClick={() => { setSaved(true); setTimeout(() => setSaved(false), 1800); }}
          style={{ ...primaryBtn, marginTop: 12, width: "100%" }}>
          <Icon name={saved ? "check" : "download"} size={18} stroke={2.4} />{saved ? t.saved + "!" : t.export}
        </button>

        {/* Drag ghost */}
        {drag && (() => {
          const p = byId(drag.pid);
          return ReactDOM.createPortal(
            <div style={{ position: "fixed", left: drag.x, top: drag.y, transform: "translate(-50%,-50%)", pointerEvents: "none", zIndex: 9999, opacity: .92 }}>
              <Token player={p} big />
            </div>, document.body);
        })()}
      </div>
    );
  }

  /* ============================================================
     APP SHELL — status bar, header, content, bottom nav
     ============================================================ */
  const TABS = [
    { id: "squad", icon: "squad", key: "nav_squad" },
    { id: "eval", icon: "eval", key: "nav_eval" },
    { id: "lineup", icon: "lineup", key: "nav_lineup" },
    { id: "journey", icon: "journey", key: "nav_journey" },
    { id: "board", icon: "board", key: "nav_board" },
  ];

  function Placeholder({ label }) {
    return (
      <div style={{ padding: "80px 24px", textAlign: "center", display: "flex", flexDirection: "column", alignItems: "center", gap: 14 }}>
        <div style={{ width: 64, height: 64, borderRadius: 18, background: "var(--brand-tint)", display: "flex", alignItems: "center", justifyContent: "center" }}>
          <Icon name="whistle" size={30} color="var(--brand)" />
        </div>
        <div style={{ fontFamily: "Sora", fontWeight: 800, fontSize: 18, color: "var(--ink)" }}>{label}</div>
        <div style={{ fontSize: 14, color: "var(--muted)", maxWidth: 230 }}>This screen isn't built yet. Screen 1 (Squad) is the current focus.</div>
      </div>
    );
  }

  function App() {
    const t = S;
    const tweaks = TWEAKS;
    const [tab, setTab] = useState("squad");
    const [playerId, setPlayerId] = useState(null);
    const [scale, setScale] = useState(1);

    useEffect(() => {
      const fit = () => {
        const h = window.innerHeight, w = window.innerWidth;
        setScale(Math.min(1, (h - 24) / 844, (w - 24) / 390));
      };
      fit();
      window.addEventListener("resize", fit);
      return () => window.removeEventListener("resize", fit);
    }, []);

    const goTab = (id) => { setTab(id); setPlayerId(null); };

    const titleMap = {
      squad: t.squad_title, eval: t.eval_title, lineup: t.lineup_title, journey: t.nav_journey, board: t.nav_board,
    };
    const selPlayer = playerId ? PLAYERS.find(p => p.id === playerId) : null;

    let content;
    if (tab === "squad") content = selPlayer
      ? <ProfileDetail t={t} tweaks={tweaks} player={selPlayer} onBack={() => setPlayerId(null)} />
      : <SquadScreen t={t} tweaks={tweaks} openPlayer={setPlayerId} />;
    else if (tab === "eval") content = <EvaluateScreen t={t} tweaks={tweaks} />;
    else if (tab === "lineup") content = <LineupScreen t={t} tweaks={tweaks} />;
    else content = <Placeholder label={titleMap[tab]} />;

    const showBack = tab === "squad" && selPlayer;

    return (
      <div className="hp-stage">
        <div className="hp-phone" style={{ transform: `scale(${scale})` }}>
          {/* status bar */}
          <div className="hp-status">
            <span style={{ fontWeight: 700 }}>9:41</span>
            <div style={{ display: "flex", gap: 5, alignItems: "center" }}>
              <span style={{ fontSize: 11 }}>5G</span>
              <svg width="20" height="11" viewBox="0 0 24 12"><rect x="1" y="2" width="19" height="8" rx="2" fill="none" stroke="currentColor" strokeWidth="1.2" opacity=".5" /><rect x="2.5" y="3.5" width="14" height="5" rx="1" fill="currentColor" /><rect x="21" y="4" width="2" height="4" rx="1" fill="currentColor" opacity=".5" /></svg>
            </div>
          </div>

          {/* header */}
          <header className="hp-header">
            {showBack ? (
              <button onClick={() => setPlayerId(null)} className="hp-iconbtn"><Icon name="chevL" size={22} /></button>
            ) : (
              <div style={{ width: 36, height: 36, borderRadius: 11, background: "var(--brand)", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
                <Icon name={tweaks.sport === "basketball" ? "basketball" : "football"} size={22} color="#fff" stroke={2} />
              </div>
            )}
            <div style={{ flex: 1, minWidth: 0 }}>
              <h1 style={{ margin: 0, fontFamily: "Sora", fontSize: 18, fontWeight: 800, color: "var(--ink)", letterSpacing: "-0.01em", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>
                {showBack ? selPlayer.name : titleMap[tab]}
              </h1>
              <div style={{ fontSize: 11.5, color: "var(--muted)", fontWeight: 600 }}>Beirut Strikers · U16</div>
            </div>
            <button className="hp-iconbtn" style={{ position: "relative" }}>
              <Icon name="bell" size={20} color="var(--muted)" />
              <span style={{ position: "absolute", top: 7, insetInlineEnd: 8, width: 7, height: 7, borderRadius: "50%", background: "var(--brand)", border: "1.5px solid var(--card)" }} />
            </button>
          </header>

          {/* content */}
          <main className="hp-content" key={tab + (selPlayer ? selPlayer.id : "")}>
            {content}
          </main>

          {/* bottom nav */}
          <nav className="hp-nav">
            {TABS.map(tb => {
              const active = tab === tb.id;
              return (
                <button key={tb.id} onClick={() => goTab(tb.id)} className={"hp-tab" + (active ? " active" : "")}>
                  <Icon name={tb.icon} size={23} stroke={active ? 2.3 : 1.9} color={active ? "var(--brand)" : "var(--muted)"} />
                  {tweaks.navStyle === "labels" && <span style={{ color: active ? "var(--brand)" : "var(--muted)" }}>{t[tb.key]}</span>}
                  {active && <span className="hp-tab-dot" />}
                </button>
              );
            })}
          </nav>
        </div>
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
