<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    font-family: "Plus Jakarta Sans", system-ui, sans-serif;
    background:
      radial-gradient(1200px 600px at 50% -10%, #16261d 0%, transparent 60%),
      #0a100d;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    overflow: hidden;
  }

  /* Default theme: brand green + light neutrals (prototype TWEAK_DEFAULTS) */
  .hp-phone {
    --app-bg: #F1F5F2; --card: #FFFFFF; --ink: #0E1512; --muted: #5E6E66;
    --line: #E8EDEA; --line-strong: #CCD6D1; --track: #F2F5F3;
    --shadow: 0 1px 2px rgba(13,30,22,.05), 0 1px 1px rgba(13,30,22,.04);
    --brand: #16A35A; --brand-deep: #0B6E45; --brand-tint: rgba(22,163,90,.12); --brand-glow: rgba(22,163,90,.32);
  }

  .hp-stage {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }

  .hp-phone {
    width: 390px; height: 844px; flex-shrink: 0;
    background: var(--app-bg);
    border-radius: 46px;
    box-shadow: 0 0 0 11px #0c0c0e, 0 0 0 13px #25282b, 0 40px 80px -20px rgba(0,0,0,.7);
    display: flex; flex-direction: column;
    overflow: hidden; position: relative;
    transform-origin: center center;
    color: var(--ink);
  }

  .hp-status {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 26px 6px; font-size: 13px; color: var(--ink); flex-shrink: 0;
  }

  .hp-header {
    display: flex; align-items: center; gap: 11px;
    padding: 6px 16px 12px; flex-shrink: 0;
    border-bottom: 1px solid var(--line);
    background: var(--app-bg);
  }
  .hp-iconbtn {
    width: 36px; height: 36px; border-radius: 11px; border: none; background: transparent;
    display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--ink);
    flex-shrink: 0; padding: 0;
  }
  .hp-iconbtn:hover { background: var(--track); }

  .hp-content {
    flex: 1; overflow-y: auto; overflow-x: hidden;
    padding-top: 14px; padding-bottom: 18px;
    background: var(--app-bg);
    scrollbar-width: none;
    -webkit-overflow-scrolling: touch;
  }
  .hp-content::-webkit-scrollbar { display: none; }

  @keyframes hp-pop { 0% { transform: scale(.3); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

  .hp-nav {
    display: flex; align-items: stretch; flex-shrink: 0;
    padding: 8px 6px 22px;
    background: var(--card);
    border-top: 1px solid var(--line);
    position: relative;
  }
  .hp-nav::after {
    content: ""; position: absolute; bottom: 9px; left: 50%; transform: translateX(-50%);
    width: 128px; height: 5px; border-radius: 3px; background: var(--ink); opacity: .18;
  }
  .hp-tab {
    flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px;
    background: none; border: none; cursor: pointer; padding: 7px 0 6px;
    font-family: inherit; font-size: 10.5px; font-weight: 700; position: relative;
    transition: transform .12s;
  }
  .hp-tab:active { transform: scale(.92); }
  .hp-tab-dot {
    position: absolute; top: -1px; left: 50%; transform: translateX(-50%);
    width: 18px; height: 3px; border-radius: 3px; background: var(--brand);
  }

  /* Range slider (evaluation sliders) */
  .hp-range {
    -webkit-appearance: none; appearance: none; height: 10px; border-radius: 6px; outline: none;
    background: linear-gradient(to right, var(--brand) var(--pct), var(--track) var(--pct));
  }
  .hp-range::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none; width: 26px; height: 26px; border-radius: 50%;
    background: #fff; border: 4px solid var(--brand); cursor: grab; box-shadow: 0 2px 6px rgba(0,0,0,.2);
  }
  .hp-range::-moz-range-thumb {
    width: 26px; height: 26px; border-radius: 50%; background: #fff; border: 4px solid var(--brand); cursor: grab;
  }

  h1, h2, h3, p { text-wrap: pretty; }
  button { -webkit-tap-highlight-color: transparent; }
</style>

    return (

        display: "flex", flexDirection: "column", gap: 2, padding: "10px 12px", borderRadius: 14,
        background: "var(--track)", border: "1px solid var(--line)", minWidth: 0,
      }}>
        <span style={{ fontSize: 11.5, fontWeight: 600, color: "var(--muted)", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{label}</span>
        <div style={{ display: "flex", alignItems: "baseline", gap: 4 }}>
          <span style={{ fontFamily: "Sora", fontSize: 22, fontWeight: 800, color: c, lineHeight: 1 }}>{value}</span>
          <span style={{ fontSize: 10, color: "var(--muted)", fontWeight: 600 }}>/100</span>
        </div>
      </div>
    );
  }

  function Pill({ children, color = "muted", solid }) {
    const map = {
      brand: ["var(--brand)", "var(--brand-tint)"],
      accent: ["#FF6B2C", "rgba(255,107,44,.13)"],
      blue: ["#2563EB", "rgba(37,99,235,.12)"],
      green: ["#16A35A", "rgba(22,163,90,.12)"],
      muted: ["var(--muted)", "var(--track)"],
    };
    const [fg, bg] = map[color] || map.muted;
    return (
      <span style={{
        display: "inline-flex", alignItems: "center", gap: 5, padding: "4px 10px", borderRadius: 999,
        fontSize: 11.5, fontWeight: 700, letterSpacing: ".01em",
        color: solid ? "#fff" : fg, background: solid ? fg : bg, whiteSpace: "nowrap",
      }}>{children}</span>
    );
  }

  function Card({ children, style, pad = 16, ...rest }) {
    return (
      <div {...rest} style={{
        background: "var(--card)", borderRadius: 20, padding: pad,
        border: "1px solid var(--line)", boxShadow: "var(--shadow)", ...style,
      }}>{children}</div>
    );
  }

  function SectionLabel({ children, action }) {
    return (
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
        <h3 style={{ margin: 0, fontSize: 12.5, fontWeight: 700, letterSpacing: ".06em", textTransform: "uppercase", color: "var(--muted)" }}>{children}</h3>
        {action}
      </div>
    );
  }

  /* Star rating (interactive) */
  function StarRating({ value, onChange, max = 5, size = 34 }) {
    return (
      <div style={{ display: "flex", gap: 6 }}>
        {Array.from({ length: max }).map((_, i) => {
          const active = i < value;
          return (
            <button key={i} onClick={() => onChange(i + 1 === value ? 0 : i + 1)}
              aria-label={`${i + 1} stars`}
              style={{ border: "none", background: "none", padding: 2, cursor: "pointer", lineHeight: 0 }}>
              <Icon name="star" size={size} stroke={1.6}
                fill={active ? "current" : "none"}
                color={active ? "var(--brand)" : "var(--line-strong)"} />
            </button>
          );
        })}
      </div>
    );
  }

  /* Slider (interactive, 0-100) */
  function RangeRow({ value, onChange, min = 0, max = 100 }) {
    const pct = ((value - min) / (max - min)) * 100;
    return (
      <div style={{ display: "flex", alignItems: "center", gap: 14 }}>
        <input type="range" min={min} max={max} value={value}
          onChange={e => onChange(+e.target.value)}
          className="hp-range"
          style={{ flex: 1, "--pct": pct + "%" }} />
        <span style={{ fontFamily: "Sora", fontWeight: 800, fontSize: 18, color: "var(--brand)", minWidth: 34, textAlign: "end" }}>{value}</span>
      </div>
    );
  }

  /* Segmented control */
  function Segmented({ options, value, onChange, size = "md" }) {
    return (
      <div style={{
        display: "inline-flex", background: "var(--track)", borderRadius: 12, padding: 3, gap: 2,
        border: "1px solid var(--line)",
      }}>
        {options.map(o => {
          const active = o.value === value;
          return (
            <button key={o.value} onClick={() => onChange(o.value)}
              style={{
                border: "none", cursor: "pointer", borderRadius: 9,
                padding: size === "sm" ? "6px 12px" : "8px 16px",
                fontSize: size === "sm" ? 12.5 : 13.5, fontWeight: 600, fontFamily: "inherit",
                background: active ? "var(--card)" : "transparent",
                color: active ? "var(--ink)" : "var(--muted)",
                boxShadow: active ? "0 1px 3px rgba(0,0,0,.12)" : "none",
                transition: "all .15s",
              }}>{o.label}</button>
          );
        })}
      </div>
    );
  }

  /* ============================================================
     SCREEN 1 — Squad list + Player Performance Profile
     ============================================================ */
  function overall(skills) {
    const v = Object.values(skills);
    return Math.round(v.reduce((a, b) => a + b, 0) / v.length);
  }

  function SquadScreen({ t, tweaks, openPlayer }) {
    const players = PLAYERS;
    const [q, setQ] = useState("");
    const list = players.filter(p => p.name.toLowerCase().includes(q.toLowerCase()));
    const lines = ["GK", "DEF", "MID", "FWD"];
    const lineLabel = { GK: "Goalkeeper", DEF: "Defenders", MID: "Midfielders", FWD: "Forwards" };

    return (
      <div style={{ padding: "0 16px 16px" }}>
        <div style={{
          position: "relative", marginBottom: 16, display: "flex", alignItems: "center",
          background: "var(--card)", border: "1px solid var(--line)", borderRadius: 14, padding: "0 12px",
        }}>
          <Icon name="search" size={18} color="var(--muted)" />
          <input value={q} onChange={e => setQ(e.target.value)} placeholder="Search players…"
            style={{
              border: "none", outline: "none", background: "none", flex: 1, padding: "12px 10px",
              fontFamily: "inherit", fontSize: 14.5, color: "var(--ink)",
            }} />
        </div>

        {lines.map(line => {
          const group = list.filter(p => p.line === line);
          if (!group.length) return null;
          return (
            <div key={line} style={{ marginBottom: 18 }}>
              <SectionLabel>{lineLabel[line]} · {group.length}</SectionLabel>
              <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                {group.map(p => (
                  <Card key={p.id} pad={10} onClick={() => openPlayer(p.id)}
                    style={{ display: "flex", alignItems: "center", gap: 12, cursor: "pointer" }}>
                    <Avatar name={p.name} num={p.num} size={46} />
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                        <span style={{ fontWeight: 700, fontSize: 15, color: "var(--ink)", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{p.name}</span>
                      </div>
                      <div style={{ display: "flex", alignItems: "center", gap: 8, marginTop: 3 }}>
                        <Pill color="brand">{p.pos}</Pill>
                        <span style={{ display: "inline-flex", alignItems: "center", gap: 5, fontSize: 12, color: "var(--muted)", fontWeight: 600 }}>
                          <AvailDot state={p.avail} />{t["avail_" + p.avail]}
                        </span>
                      </div>
                    </div>
                    <div style={{ textAlign: "end", display: "flex", flexDirection: "column", alignItems: "flex-end" }}>
                      <span style={{ fontFamily: "Sora", fontWeight: 800, fontSize: 20, color: ratingColor(overall(p.skills)), lineHeight: 1 }}>{overall(p.skills)}</span>
                      <span style={{ fontSize: 9.5, color: "var(--muted)", fontWeight: 700, textTransform: "uppercase", letterSpacing: ".05em" }}>{t.overall}</span>
                    </div>
                    <Icon name="chevR" size={18} color="var(--line-strong)" style={{ marginInlineStart: -2 }} />
                  </Card>
                ))}
              </div>
            </div>
          );
        })}
      </div>
    );
  }

  function ProfileDetail({ t, tweaks, player, onBack }) {
    const [editing, setEditing] = useState(false);
    const [skills, setSkills] = useState(player.skills);
    const bump = (k, d) => setSkills(s => ({ ...s, [k]: Math.max(0, Math.min(100, s[k] + d)) }));
    const ov = overall(skills);

    const statBox = (label, value, unit) => (
      <div style={{ flex: 1, textAlign: "center", padding: "10px 4px" }}>
        <div style={{ fontFamily: "Sora", fontWeight: 800, fontSize: 19, color: "var(--ink)" }}>{value}<span style={{ fontSize: 11, color: "var(--muted)", fontWeight: 600 }}>{unit}</span></div>
        <div style={{ fontSize: 10.5, color: "var(--muted)", fontWeight: 700, textTransform: "uppercase", letterSpacing: ".04em", marginTop: 2 }}>{label}</div>
      </div>
    );

    return (
      <div style={{ paddingBottom: 16 }}>
        {/* Hero */}
        <div style={{
          margin: "0 16px 16px", borderRadius: 24, padding: "18px 18px 16px",
          background: "linear-gradient(150deg, var(--brand), var(--brand-deep))", color: "#fff", position: "relative", overflow: "hidden",
        }}>
          <div style={{ position: "absolute", insetInlineEnd: -30, top: -30, width: 140, height: 140, borderRadius: "50%", background: "rgba(255,255,255,.08)" }} />
          <div style={{ position: "absolute", insetInlineEnd: 30, bottom: -50, width: 110, height: 110, borderRadius: "50%", background: "rgba(255,255,255,.07)" }} />
          <div style={{ display: "flex", gap: 14, alignItems: "center", position: "relative" }}>
            <Avatar name={player.name} size={68} ring="rgba(255,255,255,.35)" />
            <div style={{ flex: 1 }}>
              <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                <h2 style={{ margin: 0, fontFamily: "Sora", fontSize: 21, fontWeight: 800, letterSpacing: "-0.01em" }}>{player.name}</h2>
              </div>
              <div style={{ display: "flex", alignItems: "center", gap: 8, marginTop: 6 }}>
                <span style={{ background: "rgba(255,255,255,.2)", padding: "3px 10px", borderRadius: 999, fontSize: 12, fontWeight: 700 }}>#{player.num} · {player.pos}</span>
                <span style={{ display: "inline-flex", alignItems: "center", gap: 5, fontSize: 12, fontWeight: 600, background: "rgba(255,255,255,.16)", padding: "3px 9px", borderRadius: 999 }}>
                  <span style={{ width: 8, height: 8, borderRadius: "50%", background: AVAIL[player.avail].color, boxShadow: "0 0 0 2px rgba(255,255,255,.4)" }} />
                  {t["avail_" + player.avail]}
                </span>
              </div>
            </div>
            <div style={{ textAlign: "center" }}>
              <div style={{ fontFamily: "Sora", fontWeight: 800, fontSize: 30, lineHeight: 1 }}>{ov}</div>
              <div style={{ fontSize: 9.5, fontWeight: 700, textTransform: "uppercase", letterSpacing: ".06em", opacity: .85 }}>{t.overall}</div>
            </div>
          </div>
          <div style={{ display: "flex", marginTop: 14, background: "rgba(255,255,255,.13)", borderRadius: 14, backdropFilter: "blur(4px)" }}>
            {statBox(t.age, player.age, "")}
            <div style={{ width: 1, background: "rgba(255,255,255,.18)", margin: "8px 0" }} />
            {statBox(t.height, player.height, "cm")}
            <div style={{ width: 1, background: "rgba(255,255,255,.18)", margin: "8px 0" }} />
            {statBox(t.weight, player.weight, "kg")}
            <div style={{ width: 1, background: "rgba(255,255,255,.18)", margin: "8px 0" }} />
            {statBox(t.foot, player.foot, "")}
          </div>
        </div>

        {/* Skills */}
        <div style={{ padding: "0 16px" }}>
          <Card style={{ marginBottom: 14 }}>
            <SectionLabel action={
              <button onClick={() => setEditing(e => !e)} style={{
                display: "inline-flex", alignItems: "center", gap: 5, border: "1px solid var(--line)",
                background: editing ? "var(--brand)" : "var(--card)", color: editing ? "#fff" : "var(--brand)",
                borderColor: editing ? "var(--brand)" : "var(--line)",
                padding: "5px 11px", borderRadius: 999, fontSize: 12, fontWeight: 700, cursor: "pointer", fontFamily: "inherit",
              }}>
                <Icon name={editing ? "check" : "edit"} size={13} stroke={2.4} />{editing ? t.save : t.edit}
              </button>
            }>{t.skills}</SectionLabel>

            {editing ? (
              <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
                {SKILLS.map(s => (
                  <div key={s.key} style={{ display: "flex", alignItems: "center", gap: 12 }}>
                    <span style={{ flex: 1, fontSize: 13.5, fontWeight: 600, color: "var(--ink)" }}>{s.label}</span>
                    <button onClick={() => bump(s.key, -1)} style={stepBtn}><Icon name="x" size={14} stroke={2.6} /></button>
                    <span style={{ fontFamily: "Sora", fontWeight: 800, fontSize: 18, color: ratingColor(skills[s.key]), minWidth: 30, textAlign: "center" }}>{skills[s.key]}</span>
                    <button onClick={() => bump(s.key, +1)} style={stepBtn}><Icon name="plus" size={14} stroke={2.6} /></button>
                  </div>
                ))}
              </div>
            ) : tweaks.skillDisplay === "chips" ? (
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
                {SKILLS.map(s => <SkillChip key={s.key} label={s.label} value={skills[s.key]} />)}
              </div>
            ) : (
              <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
                {SKILLS.map(s => <SkillBar key={s.key} label={s.label} value={skills[s.key]} />)}
              </div>
            )}
            {editing && <div style={{ marginTop: 12, fontSize: 11.5, color: "var(--muted)", display: "flex", alignItems: "center", gap: 6 }}>
              <Icon name="whistle" size={14} color="var(--brand)" /> {t.coach_view} · changes sync to the player's profile
            </div>}
          </Card>

          {/* Attendance */}
          <Card>
            <SectionLabel action={<span style={{ fontFamily: "Sora", fontWeight: 800, fontSize: 15, color: "var(--brand)" }}>{Math.round(player.attendance * 100)}%</span>}>{t.recent}</SectionLabel>
            <div style={{ display: "flex", flexDirection: "column", gap: 2 }}>
              {ATTENDANCE_LOG.map((a, i) => {
                const map = { present: ["#16A35A", "check", "Present"], late: ["#CA8A04", "clock", "Late"], absent: ["#DC2626", "x", "Absent"] };
                const [c, ic, lab] = map[a.status];
                return (
                  <div key={i} style={{ display: "flex", alignItems: "center", gap: 12, padding: "9px 0", borderBottom: i < ATTENDANCE_LOG.length - 1 ? "1px solid var(--line)" : "none" }}>
                    <div style={{ width: 30, height: 30, borderRadius: 9, background: c + "22", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
                      <Icon name={ic} size={15} color={c} stroke={2.6} />
                    </div>
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <div style={{ fontSize: 13.5, fontWeight: 600, color: "var(--ink)" }}>{a.type}</div>
                    </div>
                    <span style={{ fontSize: 12, color: "var(--muted)", fontWeight: 600 }}>{a.date}</span>
                    <span style={{ fontSize: 11.5, fontWeight: 700, color: c, minWidth: 52, textAlign: "end" }}>{lab}</span>
                  </div>
                );
              })}
            </div>
          </Card>
        </div>
      </div>
    );
  }

  const stepBtn = {
    width: 32, height: 32, borderRadius: 10, border: "1px solid var(--line)", background: "var(--track)",
    color: "var(--ink)", display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer",
  };

  /* ============================================================
     SCREEN 2 — Session / Match Evaluation Form
     ============================================================ */
  const primaryBtn = {
    border: "none", background: "var(--brand)", color: "#fff", borderRadius: 16, padding: "15px 24px",
    fontFamily: "inherit", fontSize: 15.5, fontWeight: 700, cursor: "pointer", boxShadow: "0 6px 16px var(--brand-glow)",
    display: "inline-flex", alignItems: "center", justifyContent: "center", gap: 8,
  };

  function EvaluateScreen({ t, tweaks }) {
    const players = PLAYERS;
    const [picking, setPicking] = useState(false);
    const [pid, setPid] = useState(players[0].id);
    const [ratings, setRatings] = useState({ technical: 0, tactical: 0, workrate: 0, discipline: 0 });
    const [note, setNote] = useState("");
    const [done, setDone] = useState(false);

    const player = players.find(p => p.id === pid);
    const useStars = tweaks.evalControl === "stars";
    const criteria = [
      { key: "technical", label: t.technical, icon: "football" },
      { key: "tactical", label: t.tactical, icon: "lineup" },
      { key: "workrate", label: t.workrate, icon: "flame" },
      { key: "discipline", label: t.discipline, icon: "whistle" },
    ];
    const filled = Object.values(ratings).filter(v => v > 0).length;
    const ready = filled === 4;

    const setR = (k, v) => setRatings(r => ({ ...r, [k]: v }));

    if (done) {
      return (
        <div style={{ padding: "60px 24px", textAlign: "center", display: "flex", flexDirection: "column", alignItems: "center", gap: 16 }}>
          <div style={{ width: 84, height: 84, borderRadius: "50%", background: "var(--brand-tint)", display: "flex", alignItems: "center", justifyContent: "center", animation: "hp-pop .4s cubic-bezier(.2,1.3,.4,1)" }}>
            <Icon name="check" size={44} color="var(--brand)" stroke={3} />
          </div>
          <div>
            <h2 style={{ margin: "0 0 6px", fontFamily: "Sora", fontWeight: 800, fontSize: 22, color: "var(--ink)" }}>{t.saved}!</h2>
            <p style={{ margin: 0, color: "var(--muted)", fontSize: 14.5, maxWidth: 240 }}>
              Evaluation for <strong style={{ color: "var(--ink)" }}>{player.name}</strong> synced to their performance profile.
            </p>
          </div>
          <button onClick={() => { setDone(false); setRatings({ technical: 0, tactical: 0, workrate: 0, discipline: 0 }); setNote(""); }}
            style={primaryBtn}>{t.rate} another player</button>
        </div>
      );
    }

    return (
      <div style={{ padding: "0 16px 16px" }}>
        {/* Player selector */}
        <SectionLabel>{t.select_player}</SectionLabel>
        <Card pad={10} onClick={() => setPicking(p => !p)} style={{ display: "flex", alignItems: "center", gap: 12, cursor: "pointer", marginBottom: picking ? 8 : 16 }}>
          <Avatar name={player.name} num={player.num} size={46} />
          <div style={{ flex: 1 }}>
            <div style={{ fontWeight: 700, fontSize: 15.5, color: "var(--ink)" }}>{player.name}</div>
            <div style={{ fontSize: 12.5, color: "var(--muted)", fontWeight: 600 }}>#{player.num} · {player.pos} · {player.age} {t.years}</div>
          </div>
          <Icon name="chevD" size={20} color="var(--muted)" style={{ transform: picking ? "rotate(180deg)" : "none", transition: "transform .2s" }} />
        </Card>
        {picking && (
          <Card pad={6} style={{ marginBottom: 16, maxHeight: 230, overflowY: "auto" }}>
            {players.map(p => (
              <div key={p.id} onClick={() => { setPid(p.id); setPicking(false); }}
                style={{ display: "flex", alignItems: "center", gap: 10, padding: "8px 8px", borderRadius: 12, cursor: "pointer", background: p.id === pid ? "var(--brand-tint)" : "transparent" }}>
                <Avatar name={p.name} size={34} />
                <span style={{ flex: 1, fontSize: 14, fontWeight: 600, color: "var(--ink)" }}>{p.name}</span>
                <Pill color="brand">{p.pos}</Pill>
                {p.id === pid && <Icon name="check" size={16} color="var(--brand)" stroke={3} />}
              </div>
            ))}
          </Card>
        )}

        {/* Progress */}
        <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 14 }}>
          <div style={{ flex: 1, height: 6, borderRadius: 6, background: "var(--track)", overflow: "hidden" }}>
            <div style={{ width: (filled / 4 * 100) + "%", height: "100%", background: "var(--brand)", borderRadius: 6, transition: "width .3s" }} />
          </div>
          <span style={{ fontSize: 12, fontWeight: 700, color: "var(--muted)", fontFamily: "Sora" }}>{filled}/4</span>
        </div>

        {/* Criteria */}
        <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
          {criteria.map(c => (
            <Card key={c.key} pad={14}>
              <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: useStars ? 12 : 6 }}>
                <div style={{ width: 34, height: 34, borderRadius: 10, background: "var(--brand-tint)", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
                  <Icon name={c.icon} size={18} color="var(--brand)" />
                </div>
                <span style={{ flex: 1, fontWeight: 700, fontSize: 14.5, color: "var(--ink)" }}>{c.label}</span>
                {useStars && ratings[c.key] > 0 && <span style={{ fontFamily: "Sora", fontWeight: 800, color: "var(--brand)", fontSize: 15 }}>{ratings[c.key]}.0</span>}
              </div>
              {useStars ? (
                <StarRating value={ratings[c.key]} onChange={v => setR(c.key, v)} />
              ) : (
                <RangeRow value={ratings[c.key] === 0 ? 50 : ratings[c.key]} onChange={v => setR(c.key, v)} />
              )}
            </Card>
          ))}
        </div>

        {/* Notes */}
        <div style={{ marginTop: 14 }}>
          <SectionLabel>{t.notes}</SectionLabel>
          <textarea value={note} onChange={e => setNote(e.target.value)} placeholder={t.notes_ph}
            rows={3} style={{
              width: "100%", boxSizing: "border-box", border: "1px solid var(--line)", borderRadius: 16,
              padding: 14, fontFamily: "inherit", fontSize: 14, color: "var(--ink)", background: "var(--card)",
              resize: "none", outline: "none",
            }} />
        </div>

        <button disabled={!ready} onClick={() => setDone(true)}
          style={{ ...primaryBtn, marginTop: 16, width: "100%", opacity: ready ? 1 : .45, cursor: ready ? "pointer" : "not-allowed" }}>
          {t.submit}
        </button>
      </div>
    );
  }

  /* ============================================================
     SCREEN 3 — Match Lineup Builder (drag & drop)
     ============================================================ */
  function autoFill(formation, players) {
    const slots = FORMATIONS[formation];
    const used = new Set();
    const assign = {};
    slots.forEach((s, i) => {
      // prefer same line + available, then any available
      const pick = players.find(p => !used.has(p.id) && p.line === s.line && p.avail !== "out")
        || players.find(p => !used.has(p.id) && p.line === s.line)
        || players.find(p => !used.has(p.id) && p.avail !== "out");
      if (pick) { assign[i] = pick.id; used.add(pick.id); }
    });
    return assign;
  }

  function Token({ player, big }) {
    const ac = AVAIL[player.avail].color;
    const sz = big ? 52 : 44;
    return (
      <div style={{ position: "relative" }}>
        <div style={{
          width: sz, height: sz, borderRadius: 15, background: "#fff",
          display: "flex", alignItems: "center", justifyContent: "center",
          fontFamily: "Sora", fontWeight: 800, fontSize: sz * 0.4, color: "var(--brand-deep)",
          boxShadow: `0 3px 8px rgba(0,0,0,.3), 0 0 0 3px ${ac}`,
        }}>{player.num}</div>
      </div>
    );
  }

  function PitchMarkings() {
    const line = "rgba(255,255,255,.35)";
    return (
      <svg viewBox="0 0 300 400" preserveAspectRatio="none" style={{ position: "absolute", inset: 0, width: "100%", height: "100%" }}>
        {[0, 1, 2, 3, 4, 5].map(i => (
          <rect key={i} x="0" y={i * 66.6} width="300" height="33.3" fill={i % 2 ? "rgba(255,255,255,.04)" : "transparent"} />
        ))}
        <g stroke={line} strokeWidth="2" fill="none">
          <rect x="4" y="4" width="292" height="392" rx="4" />

  function LineupScreen({ t, tweaks }) {
    const players = PLAYERS;

    const [formation, setFormation] = useState("4-3-3");
    const [assign, setAssign] = useState(() => autoFill("4-3-3", players));
    const [drag, setDrag] = useState(null); // {pid, x, y, from}
    const [saved, setSaved] = useState(false);
    const pitchRef = useRef(null);
    const dragRef = useRef(null);
    dragRef.current = drag;

    const slots = FORMATIONS[formation];
    const assignedIds = new Set(Object.values(assign));
    const roster = players.filter(p => !assignedIds.has(p.id));
    const onCount = Object.values(assign).filter(id => byId(id)?.avail === "in").length;

    const changeFormation = (f) => { setFormation(f); setAssign(autoFill(f, players)); };

    const startDrag = (e, pid, from) => {
      e.preventDefault();
      const pt = e.touches ? e.touches[0] : e;
      setDrag({ pid, x: pt.clientX, y: pt.clientY, from });
    };

    useEffect(() => {
      if (!drag) return;
      const move = (e) => {
        const pt = e.touches ? e.touches[0] : e;
        setDrag(d => d ? { ...d, x: pt.clientX, y: pt.clientY } : d);
      };
      const up = (e) => {
        const d = dragRef.current;
        if (!d) return;
        const pt = e.changedTouches ? e.changedTouches[0] : e;
        const rect = pitchRef.current.getBoundingClientRect();
        const inside = pt.clientX >= rect.left && pt.clientX <= rect.right && pt.clientY >= rect.top && pt.clientY <= rect.bottom;
        if (inside) {
          // nearest slot
          let best = -1, bestDist = Infinity;
          slots.forEach((s, i) => {
            const sx = rect.left + s.x / 100 * rect.width;
            const sy = rect.top + s.y / 100 * rect.height;
            const dist = Math.hypot(sx - pt.clientX, sy - pt.clientY);
            if (dist < bestDist) { bestDist = dist; best = i; }
          });
          setAssign(a => {
            const na = { ...a };
            // remove dragged from its old slot
            if (d.from != null) delete na[d.from];
            else Object.keys(na).forEach(k => { if (na[k] === d.pid) delete na[k]; });
            // swap if target occupied
            const occupant = na[best];
            if (occupant && d.from != null) na[d.from] = occupant;
            na[best] = d.pid;
            return na;
          });
        } else if (d.from != null) {
          // dropped outside -> remove from pitch
          setAssign(a => { const na = { ...a }; delete na[d.from]; return na; });
        }
        setDrag(null);
      };
      window.addEventListener("pointermove", move);
      window.addEventListener("pointerup", up);
      return () => { window.removeEventListener("pointermove", move); window.removeEventListener("pointerup", up); };
    }, [drag ? true : false, formation]);

    return (
      <div style={{ padding: "0 16px 12px", userSelect: "none", touchAction: "none" }}>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 12 }}>

          boxShadow: "var(--shadow)", marginBottom: 14,
        }}>
          <PitchMarkings />
          {slots.map((s, i) => {
            const pid = assign[i];
            const p = pid ? byId(pid) : null;
            const isDragging = drag && drag.from === i;
            return (
              <div key={i} style={{
                position: "absolute", left: s.x + "%", top: s.y + "%", transform: "translate(-50%,-50%)",
                display: "flex", flexDirection: "column", alignItems: "center", gap: 3, opacity: isDragging ? .3 : 1,
              }}>
                {p ? (
                  <div onPointerDown={(e) => startDrag(e, pid, i)} style={{ cursor: "grab", display: "flex", flexDirection: "column", alignItems: "center", gap: 3 }}>
                    <Token player={p} />
                    <span style={tokenName}>{p.name.split(" ")[0]}</span>
                  </div>
                ) : (
                  <div style={{
                    width: 44, height: 44, borderRadius: 14, border: "2px dashed rgba(255,255,255,.6)",
                    display: "flex", alignItems: "center", justifyContent: "center", color: "rgba(255,255,255,.85)",
                    fontSize: 10.5, fontWeight: 700, background: "rgba(255,255,255,.08)",
                  }}>{s.slot}</div>
                )}
              </div>
            );
          })}
        </div>

        {/* Roster */}
        <SectionLabel action={<span style={{ fontSize: 12, color: "var(--muted)", fontWeight: 600 }}>{t.drag_hint}</span>}>{t.roster} · {roster.length}</SectionLabel>
        <div style={{ display: "flex", gap: 10, overflowX: "auto", paddingBottom: 6, margin: "0 -16px", padding: "2px 16px 6px" }}>
          {roster.length === 0 && <span style={{ fontSize: 13, color: "var(--muted)", padding: "8px 0" }}>All players on the pitch.</span>}
          {roster.map(p => (

              style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 5, cursor: "grab", flexShrink: 0, width: 60 }}>
              <div style={{ position: "relative" }}>
                <Avatar name={p.name} size={48} />
                <span style={{ position: "absolute", bottom: -3, insetInlineEnd: -3, width: 14, height: 14, borderRadius: "50%", background: AVAIL[p.avail].color, border: "2.5px solid var(--card)" }} />
              </div>
              <span style={{ fontSize: 11, fontWeight: 600, color: "var(--ink)", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis", maxWidth: 60, textAlign: "center" }}>{p.name.split(" ")[0]}</span>
              <Pill color="brand">{p.pos}</Pill>
            </div>
          ))}
        </div>

        <button onClick={() => { setSaved(true); setTimeout(() => setSaved(false), 1800); }}
          style={{ ...primaryBtn, marginTop: 12, width: "100%" }}>
          <Icon name={saved ? "check" : "download"} size={18} stroke={2.4} />{saved ? t.saved + "!" : t.export}

        })()}
      </div>
    );
  }

  function radarPoints(values, cx, cy, r) {
    const n = values.length;
    return values.map((v, i) => {
      const ang = -Math.PI / 2 + (i * 2 * Math.PI) / n;
      const rr = (v / 100) * r;
      return [cx + rr * Math.cos(ang), cy + rr * Math.sin(ang)];
    });
  }

  function RadarChart({ metrics, data, size = 240 }) {
    const cx = size / 2, cy = size / 2, r = size / 2 - 38;
    const n = metrics.length;
    const rings = [0.25, 0.5, 0.75, 1];
    const axisPt = (i, mul) => {
      const ang = -Math.PI / 2 + (i * 2 * Math.PI) / n;
      return [cx + r * mul * Math.cos(ang), cy + r * mul * Math.sin(ang)];
    };
    const vals = metrics.map(m => data[m.key]);
    const pts = radarPoints(vals, cx, cy, r);
    const poly = pts.map(p => p.join(",")).join(" ");

    return (
      <svg viewBox={`0 0 ${size} ${size}`} style={{ width: "100%", height: "auto", overflow: "visible" }}>
        {rings.map((ring, ri) => (
          <polygon key={ri} fill="none" stroke="var(--line)" strokeWidth="1"
            points={metrics.map((_, i) => axisPt(i, ring).join(",")).join(" ")} />
        ))}
        {metrics.map((_, i) => {
          const [x, y] = axisPt(i, 1);
          return <line key={i} x1={cx} y1={cy} x2={x} y2={y} stroke="var(--line)" strokeWidth="1" />;
        })}
        <polygon points={poly} fill="var(--brand)" fillOpacity="0.18" stroke="var(--brand)" strokeWidth="2.5" strokeLinejoin="round" />
        {pts.map((p, i) => <circle key={i} cx={p[0]} cy={p[1]} r="3.5" fill="var(--brand)" stroke="var(--card)" strokeWidth="2" />)}
        {metrics.map((m, i) => {
          const [x, y] = axisPt(i, 1.2);
          return (
            <text key={i} x={x} y={y} textAnchor="middle" dominantBaseline="middle"
              fontSize="11" fontWeight="700" fill="var(--muted)" fontFamily="Plus Jakarta Sans">
              {m.short}
            </text>
          );
        })}
      </svg>
    );
  }

  function TrendChart({ values, labels, w = 320, h = 130 }) {
    const pad = { l: 8, r: 8, t: 12, b: 22 };
    const min = Math.min(...values) - 6, max = Math.max(...values) + 4;
    const iw = w - pad.l - pad.r, ih = h - pad.t - pad.b;
    const x = i => pad.l + (i / (values.length - 1)) * iw;
    const y = v => pad.t + ih - ((v - min) / (max - min)) * ih;
    const line = values.map((v, i) => `${i === 0 ? "M" : "L"}${x(i)},${y(v)}`).join(" ");
    const area = `${line} L${x(values.length - 1)},${pad.t + ih} L${x(0)},${pad.t + ih} Z`;
    return (
      <svg viewBox={`0 0 ${w} ${h}`} style={{ width: "100%", height: "auto" }}>
        <defs>
          <linearGradient id="hp-trend" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor="var(--brand)" stopOpacity="0.28" />
            <stop offset="100%" stopColor="var(--brand)" stopOpacity="0" />
          </linearGradient>
        </defs>
        {[0, 0.5, 1].map((g, i) => (
          <line key={i} x1={pad.l} y1={pad.t + ih * g} x2={w - pad.r} y2={pad.t + ih * g} stroke="var(--line)" strokeWidth="1" strokeDasharray={i === 2 ? "0" : "3 4"} />
        ))}
        <path d={area} fill="url(#hp-trend)" />
        <path d={line} fill="none" stroke="var(--brand)" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" />
        {values.map((v, i) => {
          const last = i === values.length - 1;
          return (
            <g key={i}>
              <circle cx={x(i)} cy={y(v)} r={last ? 5 : 3.5} fill={last ? "var(--brand)" : "var(--card)"} stroke="var(--brand)" strokeWidth="2.5" />
              {last && <text x={x(i)} y={y(v) - 12} textAnchor="middle" fontSize="13" fontWeight="800" fill="var(--brand)" fontFamily="Sora">{v}</text>}
            </g>
          );
        })}
        {labels.map((l, i) => (
          <text key={i} x={x(i)} y={h - 6} textAnchor="middle" fontSize="10" fontWeight="600" fill="var(--muted)" fontFamily="Plus Jakarta Sans">{l}</text>
        ))}
      </svg>
    );
  }

      const fit = () => {
        const h = window.innerHeight, w = window.innerWidth;
        setScale(Math.min(1, (h - 24) / 844, (w - 24) / 390));
      };
      fit();
      window.addEventListener("resize", fit);
      return () => window.removeEventListener("resize", fit);
    }, []);

    const goTab = (id) => { setTab(id); setPlayerId(null); };

    const titleMap = {
      squad: t.squad_title, eval: t.eval_title, lineup: t.lineup_title, journey: t.journey_title, board: t.board_title,
    };
    const selPlayer = playerId ? PLAYERS.find(p => p.id === playerId) : null;

    let content;
    if (tab === "squad") content = selPlayer
      ? <ProfileDetail t={t} tweaks={tweaks} player={selPlayer} onBack={() => setPlayerId(null)} />
      : <SquadScreen t={t} tweaks={tweaks} openPlayer={setPlayerId} />;
    else if (tab === "eval") content = <EvaluateScreen t={t} tweaks={tweaks} />;
    else if (tab === "lineup") content = <LineupScreen t={t} tweaks={tweaks} />;
    else if (tab === "journey") content = <JourneyScreen t={t} tweaks={tweaks} />;
    else content = <BoardScreen t={t} tweaks={tweaks} />;

    const showBack = tab === "squad" && selPlayer;

    return (
      <div className="hp-stage">
        <div className="hp-phone" style={{ transform: `scale(${scale})` }}>
          {/* status bar */}
          <div className="hp-status">
            <span style={{ fontWeight: 700 }}>9:41</span>
            <div style={{ display: "flex", gap: 5, alignItems: "center" }}>
              <span style={{ fontSize: 11 }}>5G</span>
              <svg width="20" height="11" viewBox="0 0 24 12"><rect x="1" y="2" width="19" height="8" rx="2" fill="none" stroke="currentColor" strokeWidth="1.2" opacity=".5" /><rect x="2.5" y="3.5" width="14" height="5" rx="1" fill="currentColor" /><rect x="21" y="4" width="2" height="4" rx="1" fill="currentColor" opacity=".5" /></svg>
            </div>
          </div>

          {/* header */}
          <header className="hp-header">
            {showBack ? (
              <button onClick={() => setPlayerId(null)} className="hp-iconbtn"><Icon name="chevL" size={22} /></button>
            ) : (
              <div style={{ width: 36, height: 36, borderRadius: 11, background: "var(--brand)", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
                <Icon name={tweaks.sport === "basketball" ? "basketball" : "football"} size={22} color="#fff" stroke={2} />
              </div>
            )}
            <div style={{ flex: 1, minWidth: 0 }}>
              <h1 style={{ margin: 0, fontFamily: "Sora", fontSize: 18, fontWeight: 800, color: "var(--ink)", letterSpacing: "-0.01em", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>
                {showBack ? selPlayer.name : titleMap[tab]}
              </h1>
              <div style={{ fontSize: 11.5, color: "var(--muted)", fontWeight: 600 }}>Beirut Strikers · U16</div>
            </div>
            <button className="hp-iconbtn" style={{ position: "relative" }}>
              <Icon name="bell" size={20} color="var(--muted)" />
              <span style={{ position: "absolute", top: 7, insetInlineEnd: 8, width: 7, height: 7, borderRadius: "50%", background: "var(--brand)", border: "1.5px solid var(--card)" }} />
            </button>
          </header>

          {/* content */}
          <main className="hp-content" key={tab + (selPlayer ? selPlayer.id : "")}>
            {content}
          </main>

          {/* bottom nav */}
          <nav className="hp-nav">
            {TABS.map(tb => {
              const active = tab === tb.id;
              return (
                <button key={tb.id} onClick={() => goTab(tb.id)} className={"hp-tab" + (active ? " active" : "")}>
                  <Icon name={tb.icon} size={23} stroke={active ? 2.3 : 1.9} color={active ? "var(--brand)" : "var(--muted)"} />
                  {tweaks.navStyle === "labels" && <span style={{ color: active ? "var(--brand)" : "var(--muted)" }}>{t[tb.key]}</span>}
                  {active && <span className="hp-tab-dot" />}
                </button>
              );
            })}
          </nav>
        </div>
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
